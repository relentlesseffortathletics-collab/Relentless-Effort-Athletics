<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#111;
            color:#f5f5f5;
            font-family:Inter,sans-serif;
        }

        nav{
            width:100%;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:25px 8%;
            position:absolute;
            top:0;
            left:0;
        }

        nav h2{
            font-family:"Cormorant Garamond",serif;
            font-size:40px;
            letter-spacing:6px;
        }

        nav ul{
            display:flex;
            gap:35px;
            list-style:none;
        }

        nav a{
            color:white;
            text-decoration:none;
            font-size:15px;
        }

        .hero{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:20px;
        }

        .hero h1{
            font-family:"Cormorant Garamond",serif;
            font-size:120px;
            letter-spacing:10px;
            font-weight:500;
        }

        .hero p{
            margin-top:15px;
            font-size:20px;
            color:#cfcfcf;
        }

        .button{
            display:inline-block;
            margin-top:40px;
            padding:15px 40px;
            border:1px solid white;
            color:white;
            text-decoration:none;
            transition:.3s;
        }

        .button:hover{
            background:white;
            color:black;
        }

    </style>

</head>

<nav>

<ul>
